<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pompeii · AI 产品经理</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 导航 -->
<nav class="nav">
  <div class="nav-content">
    <a class="nav-brand" href="index.html">Pompeii</a>
    <div class="nav-links">
      <a class="nav-link" href="portfolio.html#capabilities">能力</a>
      <a class="nav-link" href="portfolio.html#work">项目</a>
      <a class="nav-link" href="portfolio.html#opensource">开源</a>
      <a class="nav-link" href="portfolio.html#writing">文章</a>
    </div>
    <div class="nav-lang">
      <button class="nav-lang-btn is-active">中</button>
      <span class="nav-lang-sep">/</span>
      <button class="nav-lang-btn">EN</button>
    </div>
  </div>
</nav>

<!-- Home -->
<main class="home">
  <section class="hero">
    <div class="home-stack">
      <div class="home-title-block">
        <span class="home-line-1">I think it. I make it.</span>
        <span class="home-line-2">Here is what Pompeii made.</span>
      </div>
      <a class="home-cta" href="portfolio.html">Welcome <span class="home-cta-arrow">→</span></a>
    </div>
  </section>
</main>

<!-- Toast -->
<div class="toast" id="toast">已复制到剪贴板</div>

<script>
// 语言切换
document.querySelectorAll('.nav-lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-lang-btn').forEach(b => b.classList.remove('is-active'));
    btn.classList.add('is-active');
    showToast('语言切换功能开发中...');
  });
});

// Toast
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}
</script>

</body>
</html>
